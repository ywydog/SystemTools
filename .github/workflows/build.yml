name: Build & Release

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.github/**'
  
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0.0)'
        required: true
        type: string
      release:
        description: '是否创建 GitHub Release'
        required: true
        type: boolean
        default: true
      draft:
        description: '是否为草稿 Release'
        required: true
        type: boolean
        default: true

env:
  PLUGIN_NAME: YourPlugin

jobs:
  build:
    runs-on: windows-2022
    name: Build Plugin
    
    outputs:
      version: ${{ steps.build-step.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build & Publish
        id: build-step
        shell: pwsh
        run: |
          # 查找项目文件
          $csproj = Get-ChildItem -Path . -Filter "*.csproj" -Recurse | Select-Object -First 1
          if (-not $csproj) {
            Write-Error "❌ 未找到 .csproj 文件"
            exit 1
          }
          Write-Host "📄 项目: $($csproj.FullName)" -ForegroundColor Gray
          
          # 获取版本号
          if ("${{ github.event.inputs.version }}") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            [xml]$proj = Get-Content $csproj.FullName
            $version = $proj.Project.PropertyGroup.Version
          }
          Write-Host "🔖 版本: $version" -ForegroundColor Cyan
          echo "version=$version" >> $env:GITHUB_OUTPUT
          
          # 清理并创建输出目录
          $OutputPath = "./output"
          if (Test-Path $OutputPath) {
            Remove-Item $OutputPath -Recurse -Force
          }
          New-Item -ItemType Directory -Path $OutputPath -Force | Out-Null
          
          # 还原依赖
          Write-Host "📦 还原 NuGet 包..." -ForegroundColor Yellow
          dotnet restore $csproj.FullName
          if ($LASTEXITCODE -ne 0) { throw "还原失败" }
          
          # 构建
          Write-Host "🔨 编译项目..." -ForegroundColor Yellow
          dotnet build $csproj.FullName -c Release --no-restore
          if ($LASTEXITCODE -ne 0) { throw "构建失败" }
          
          # 发布（生成 CIPX）
          Write-Host "📤 发布项目..." -ForegroundColor Yellow
          dotnet publish $csproj.FullName `
            -c Release `
            --no-build `
            -p:CreateCipx=true `
            -o $OutputPath
          if ($LASTEXITCODE -ne 0) { throw "发布失败" }
          
          # 显示结果
          Write-Host ""
          Write-Host "✅ 构建完成！产物列表：" -ForegroundColor Green
          Get-ChildItem $OutputPath -Recurse | ForEach-Object {
            $size = if ($_.Length -lt 1KB) { "$($_.Length) B" } 
                    elseif ($_.Length -lt 1MB) { "{0:F2} KB" -f ($_.Length/1KB) }
                    else { "{0:F2} MB" -f ($_.Length/1MB) }
            Write-Host "   📎 $($_.Name) ($size)" -ForegroundColor Gray
          }

      # 上传 CIPX 文件（必需）
      - name: Upload CIPX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}_cipx
          path: ./output/*.cipx
          if-no-files-found: error
          retention-days: 30

      # 上传 NuGet 包（可选）
      - name: Upload NuPkg Artifact
        uses: actions/upload-artifact@v4
        if: ${{ hashFiles('./output/*.nupkg') != '' }}
        with:
          name: ${{ env.PLUGIN_NAME }}_nupkg
          path: ./output/*.nupkg
          retention-days: 7

  release:
    runs-on: windows-2022
    name: Create Release
    needs: build
    if: ${{ github.event.inputs.release == true && github.event_name == 'workflow_dispatch' }}
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: ${{ env.PLUGIN_NAME }}_*
          merge-multiple: true

      - name: Generate Release Note
        shell: pwsh
        run: |
          $version = "${{ needs.build.outputs.version }}"
          $changelogPath = "./changelog/${version}.md"
          
          $md5Summary = @"
          
          ## 文件校验
          
          > [!important]
          > 下载后请校验文件 MD5 值，确保文件完整性。
          
          | 文件名 | MD5 |
          |--------|-----|
          "@
          
          $hashes = [ordered]@{}
          
          # 计算所有文件的 MD5
          Get-ChildItem ./artifacts -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm MD5
            $md5Summary += "`n| $($_.Name) | ``$($hash.Hash)`` |"
            $hashes.Add($_.Name, $hash.Hash)
          }
          
          # 添加隐藏元数据
          $json = ConvertTo-Json $hashes -Compress
          $md5Summary += "`n`n<!-- CLASSISLAND_PKG_MD5 ${json} -->"
          
          # 读取或创建变更日志
          if (Test-Path $changelogPath) {
            $changelog = Get-Content $changelogPath -Raw
          } else {
            $changelog = "## 版本 ${version}`n`n- 更新内容详见提交历史"
          }
          
          $fullContent = $changelog + "`n`n" + $md5Summary
          $fullContent | Out-File -FilePath "./release-note.md" -Encoding utf8
          
          Write-Host "生成的发布说明：" -ForegroundColor Gray
          Get-Content "./release-note.md"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./artifacts/*"
          tag: v${{ needs.build.outputs.version }}
          name: ${{ env.PLUGIN_NAME }} v${{ needs.build.outputs.version }}
          bodyFile: ./release-note.md
          draft: ${{ github.event.inputs.draft }}
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: false